#This enables that when The application starts the
spring.docker.compose.lifecycle-management=start-and-stop
#This enables the Docker Services to be created from Scratch at the Start of the Application (images,containers and so on)
spring.docker.compose.start.command=up

#This Starts the docker existing services at the Start of the Application (images,containers and so on)
#spring.docker.compose.start.command=start

#This Stops the docker existing services at the Start of the Application (images,containers and so on)
spring.docker.compose.stop.command=stop