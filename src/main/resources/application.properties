spring.application.name=jobportal

logging.pattern.console= ${CONSOLE_LOG_PATTERN:%green(%d{HH:mm:ss.SSS}) %blue(%-5level) %red([%thread]) %yellow(%logger{15}) - %cyan(%msg%n)} 

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


#Setting Up my H2 Database, url and username, password and mode

#spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

#Changing the spring.sql.init.mode=embedded to always so my H2 Database file can be stored persistently and located on my local files
#spring.sql.init.mode=always
spring.sql.init.mode=embedded


#Updating a Location for my Schema and Data isntead of the Default understood by Spring which is to be lcated under the resources folder
spring.sql.init.schema-locations=classpath:sql/jobportal-schema.sql
spring.sql.init.data-locations=optional:classpath:sql/jobportal-data.sql


#Making the H2 Data saving to Disk - No more Loosing Data (By storing in the file available in our app instead of memory which reset when app is refreshed
#AUTO_SERVER : allows multiple connection to connect to the H2 database
# Use forward slashes and wrap the path properly
spring.datasource.url=jdbc:h2:file:D:/SpringBootDev/jobportal/jobportaldb;AUTO_SERVER=true


# Tells Hibernate which "language/dialect" to use when generating SQL queries.
# Every database (H2, MySQL, PostgreSQL) has slight differences in SQL syntax.
# Without this, Hibernate can't figure out how to talk to your database.
# Example: H2 uses "AUTO_INCREMENT" differently than MySQL ? the dialect handles that.
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect




# Controls how Hibernate manages your database schema (tables/columns) on startup.
# "update" means: look at your @Entity classes and UPDATE the DB to match them.
# It will ADD new tables/columns if missing, but won't delete existing data.
#
# Other options:
#   create       ? drops and recreates all tables every time (loses data on restart)
#   create-drop  ? creates tables on start, drops them when app shuts down
#   validate     ? checks entities match DB but makes NO changes (good for production)
#   none         ? do nothing, you manage the DB yourself
#
# "update" is great for development but avoid it in production ? use "validate" or "none" there.
spring.jpa.hibernate.ddl-auto=update

